<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mitten Smash Pickleball{% endblock %}</title>
  <style>
    :root {
      /* Pickleball court palette: court green, ball lime, court lines */
      --bg: #0d1f0d;
      --surface: #163016;
      --court: #1e4620;
      --text: #e8f5e9;
      --muted: #7cb87c;
      --accent: #b8e986;
      --court-line: #e8e4d9;
      --success: #81c784;
      --error: #e57373;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 1.5rem;
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    /* Nav as baseline / court line */
    nav {
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 3px solid var(--court-line);
    }
    nav a { margin-right: 1rem; }
    .flash { padding: 0.5rem 0.75rem; margin-bottom: 1rem; border-radius: 6px; border-left: 4px solid var(--court-line); }
    .flash.success { background: rgba(129, 199, 132, 0.2); color: var(--success); }
    .flash.error { background: rgba(229, 115, 115, 0.2); color: var(--error); }
    h1 { font-size: 1.5rem; margin-top: 0; }
    form label { display: block; margin-top: 0.75rem; color: var(--muted); font-size: 0.9rem; }
    input[type="text"], input[type="number"], input[type="password"], select, textarea {
      width: 100%;
      max-width: 24rem;
      padding: 0.5rem 0.75rem;
      margin-top: 0.25rem;
      background: var(--surface);
      border: 2px solid var(--court-line);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    button, .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--bg);
      border: 2px solid var(--court-line);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }
    button:hover, .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 2px solid var(--court-line); }
    table { border-collapse: collapse; width: 100%; max-width: 32rem; border: 2px solid var(--court-line); border-radius: 6px; overflow: hidden; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--court-line); }
    th { color: var(--court-line); font-weight: 600; background: var(--court); }
    /* Shared modal (rating gain, schedule difficulty, review) */
    .rating-gain-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .rating-gain-modal[hidden] { display: none; }
    .rating-gain-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      cursor: pointer;
    }
    .rating-gain-content {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--court-line);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      max-width: 32rem;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    .rating-gain-title { margin: 0 0 0.75rem 0; font-size: 1.25rem; }
    .rating-gain-results {
      margin-top: 1rem;
      color: var(--text);
    }
    .rating-gain-results ul { margin: 0.5rem 0 0 0; padding-left: 1.25rem; }
    .rating-gain-results li { margin-bottom: 0.5rem; }
    .rating-gain-results .gain-line { font-weight: 600; color: var(--accent); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('schedule') }}">Schedule</a>
    <a href="{{ url_for('availability') }}">Availability</a>
    <a href="{{ url_for('rankings') }}">Rankings</a>
    <a href="{{ url_for('history') }}">Past games</a>
    <a href="{{ url_for('generate') }}">Generate</a>
    <a href="{{ url_for('players') }}">Players</a>
  </nav>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
